<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="/Assets/logo.png" type="image/x-icon" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
        />
        <title>Weather Forecast</title>
        <link rel="stylesheet" href="./CSS/weatherPage.css" />
        <link rel="stylesheet" href="CSS/navbar.css" />
        <link rel="icon" href="/Assets/logo.png" type="image/x-icon" />
        <link rel="stylesheet" href="./CSS/buttons.css" />
        <link rel="stylesheet" href="./CSS/tables.css" />
        <link rel="stylesheet" href="./CSS/extras.css" />
        <link rel="stylesheet" href="./CSS/container.css" />
        <link rel="stylesheet" href="./CSS/inputs.css" />
        <link rel="stylesheet" href="./CSS/historyArea.css" />
        <link
            rel="stylesheet"
            media="screen and (max-width: 699px)"
            href="./CSS/containerMobile.css"
        />
        <link rel="stylesheet" href="./CSS/footer.css" />
        <link rel="stylesheet" href="./CSS/loading_anim.css" />
        <link rel="stylesheet" href="./CSS/universalFontFamily.css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>

    <body>
        <div id="navbarContainer"></div>
        <div class="containerWeatherPageParent">
            <div class="container containerWeatherPageBody">
                <h3>Weather Checker</h3>
                <form class="weatherForm">
                    <input
                        type="text"
                        autocomplete="off"
                        class="usrInp"
                        placeholder="Enter the city"
                    />
                    <button type="submit" class="mainBtn btnTypeA">
                        Search
                    </button>
                </form>
                <div id="loadingGif" hidden>
                    <output class="spinner-border" class="">
                        <span class="sr-only"></span>
                    </output>
                </div>
                <div class="resultDisplayAreaMain" hidden>
                    <div class="resultDisplayArea"></div>
                </div>
            </div>
        </div>
        <div id="footer">
            <div class="footer">
                <p>Gaurab Dhakal &copy; 2026</p>
            </div>
        </div>
    </body>
    <script src="./JS/weather.js"></script>
    <script src="./JS/buttonTransform.js"></script>
    <script src="./JS/navloader.js"></script>
</html>
